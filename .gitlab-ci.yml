stages:
  - build
  - deploy

variables:
  APPLICATION_NAME: shinsei-manager-front
  CONTAINER_IMAGE: ${AWS_ECR_URL}/${APPLICATION_NAME}

# --------
# Production (git tag on master)
# --------

build:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG
    - when: never
  tags:
    - dind
  before_script:
    - aws ecr create-repository --repository-name ${APPLICATION_NAME} || echo "Repository might have already existed"
  script:
    - docker build -t ${CONTAINER_IMAGE}:${CI_COMMIT_TAG} .
    - docker push ${CONTAINER_IMAGE}:${CI_COMMIT_TAG}

deploy:
  stage: deploy
  needs:
    - build
  rules:
    - if: $CI_COMMIT_TAG
    - when: never
  script:
    - IMAGE_TAG=${CI_COMMIT_TAG} envsubst < kustomize/overlays/prod/kustomization.yml | kubectl apply -k -
    - kubectl rollout status deployment/${APPLICATION_NAME} --timeout=600s
  environment:
    name: production
    kubernetes:
      namespace: ${KUBERNETES_NAMESPACE}

# --------
# Staging (staging branch)
# --------

build_staging:
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
    - when: never
  before_script:
    - aws ecr create-repository --repository-name ${APPLICATION_NAME} || echo "Repository might have already existed"
  script:
    - docker build -t ${CONTAINER_IMAGE}:${CI_COMMIT_SHORT_SHA} .
    - docker push ${CONTAINER_IMAGE}:${CI_COMMIT_SHORT_SHA}

deploy_staging:
  stage: deploy
  needs:
    - build_staging
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
    - when: never
  script:
    # Deploy staging
    - (cd kustomize/overlays/staging && IMAGE_TAG=${CI_COMMIT_SHORT_SHA} envsubst < kustomization.yml > kustomization.subst.yml && mv kustomization.subst.yml kustomization.yml && kubectl apply -k .)
    
    # Deploy staging PDF
    - (cd kustomize/overlays/staging-pdf && IMAGE_TAG=${CI_COMMIT_SHORT_SHA} envsubst < kustomization.yml > kustomization.subst.yml && mv kustomization.subst.yml kustomization.yml && kubectl apply -k .)
    
    # Deploy staging PDF Toggle
    - (cd kustomize/overlays/staging-pdf-toggle && IMAGE_TAG=${CI_COMMIT_SHORT_SHA} envsubst < kustomization.yml > kustomization.subst.yml && mv kustomization.subst.yml kustomization.yml && kubectl apply -k .)

    # Rollout deployments
    - kubectl rollout status deployment/${APPLICATION_NAME}-staging --timeout=600s
    - kubectl rollout status deployment/${APPLICATION_NAME}-staging-pdf --timeout=600s
    - kubectl rollout status deployment/${APPLICATION_NAME}-staging-pdf-toggle --timeout=600s
  environment:
    name: production
    kubernetes:
      namespace: ${KUBERNETES_NAMESPACE}
