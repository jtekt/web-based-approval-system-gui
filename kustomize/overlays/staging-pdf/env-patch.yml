apiVersion: apps/v1
kind: Deployment
metadata:
  name: shinsei-manager-frontend
spec:
  template:
    spec:
      containers:
        - name: shinsei-manager-frontend
          env:
            - name: VITE_PDF_ONLY
              value: "true"
            - name: VITE_APP_TITLE
              value: "電子捺印システム"
